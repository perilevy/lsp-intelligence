name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies (clean)
        run: yarn install --frozen-lockfile

      - name: Install test fixture dependencies
        run: cd test-fixtures/monorepo && yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Build (clean)
        run: yarn build

      - name: Verify no stale dist artifacts
        run: |
          if ls dist/tools/composites/findCodeByBehavior* 2>/dev/null; then
            echo "ERROR: stale findCodeByBehavior artifacts in dist/"
            exit 1
          fi
          if ! ls dist/tools/composites/findCode.js 2>/dev/null; then
            echo "ERROR: findCode.js missing from dist/"
            exit 1
          fi

      - name: Verify registered tool surface
        run: |
          for tool in findCode findPattern rootCauseTrace apiGuard clearIndex; do
            if ! grep -q "$tool" dist/index.js; then
              echo "ERROR: $tool missing from dist/index.js"
              exit 1
            fi
          done

      - name: Run tests
        run: yarn test

      - name: Run search quality benchmarks
        run: yarn bench
