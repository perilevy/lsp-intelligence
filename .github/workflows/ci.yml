name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies (clean)
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Build (clean)
        run: yarn build

      - name: Verify no stale dist artifacts
        run: |
          # findCodeByBehavior was removed in the redesign — must not exist in dist
          if ls dist/tools/composites/findCodeByBehavior* 2>/dev/null; then
            echo "ERROR: stale findCodeByBehavior artifacts in dist/"
            exit 1
          fi
          # findCode must exist
          if ! ls dist/tools/composites/findCode.js 2>/dev/null; then
            echo "ERROR: findCode.js missing from dist/"
            exit 1
          fi

      - name: Verify registered tool surface
        run: |
          # Entry point must import findCode, not findCodeByBehavior
          if grep -q 'findCodeByBehavior' dist/index.js; then
            echo "ERROR: dist/index.js still references findCodeByBehavior"
            exit 1
          fi
          if ! grep -q 'findCode' dist/index.js; then
            echo "ERROR: dist/index.js does not reference findCode"
            exit 1
          fi

      - name: Run tests
        run: yarn test
