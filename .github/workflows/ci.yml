name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install test fixture dependencies
        run: cd test-fixtures/monorepo && yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Build
        run: yarn build

      - name: Verify dist
        run: |
          if ls dist/tools/composites/findCodeByBehavior* 2>/dev/null; then
            echo "ERROR: stale findCodeByBehavior in dist/"; exit 1
          fi
          for tool in findCode findPattern rootCauseTrace apiGuard clearIndex; do
            if ! grep -q "$tool" dist/index.js; then
              echo "ERROR: $tool missing from dist/index.js"; exit 1
            fi
          done

      - name: Test
        run: yarn test

      - name: Planner benchmarks
        run: yarn bench

      - name: End-to-end benchmarks
        run: yarn bench:e2e
